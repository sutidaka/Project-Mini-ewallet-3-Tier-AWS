global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "10.0.1.68:9100"
          - "10.0.2.240:9100"

  - job_name: "ewallet-backend"
    metrics_path: /health
    static_configs:
      - targets:
          - "10.0.2.240:8000"