services:
  backend:
    image: ${APP_IMAGE}
    container_name: ewallet-backend
    restart: always
    ports:
      - "8080:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
