services:
  frontend:
    image: ${WEB_IMAGE}
    container_name: ewallet-frontend
    restart: always
    ports:
      - "80:80"
    env_file:
      - .env
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
